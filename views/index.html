<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Plus</title>
    <link rel="stylesheet" href="/public/css/home.css">
    <link rel="stylesheet" href="/public/css/debug.css">
</head>
<body>
<div id="app">
    <header id="header">
        <h1>
            <img src="/public/images/icons/tv.svg" class="svg-icon" alt="">
            IPTV Plus
        </h1>
        <div id="search-box">
            <input id="search-input" type="text" placeholder="Search channels..." autocomplete="off">
            <span id="search-icon"><img src="/public/images/icons/search.svg" class="svg-icon" alt=""></span>
        </div>
    </header>

    <section id="favorites">
        <h2>Favorites</h2>
        <div id="favorites-grid"></div>
    </section>

    <section id="recent">
        <h2>Recently Watched</h2>
        <div id="recent-grid"></div>
    </section>

    <div id="back-nav" class="hidden">
        <button id="btn-back" class="top-btn">
            <img src="/public/images/icons/arrow-back.svg" class="svg-icon" alt="">
            Back
        </button>
        <span id="current-category-name"></span>
    </div>

    <section id="categories-view">
        <h2>Categories</h2>
        <div id="categories-grid"></div>
    </section>

    <main id="channels-view" class="hidden">
        <h2 id="channels-title">Channels</h2>
        <div id="channels-grid"></div>
    </main>
</div>

<div id="debug-panel" class="debug-panel hidden">
    <div class="debug-header">
        <span>Debug Panel</span>
        <button id="debug-close" class="debug-close">×</button>
    </div>
    <div class="debug-content">
        <div class="debug-section">
            <h3>Keyboard Events (Last 20)</h3>
            <div id="debug-key-events" class="debug-events"></div>
        </div>
        <div class="debug-section">
            <h3>Console Logs (Last 50)</h3>
            <div id="debug-logs" class="debug-logs"></div>
        </div>
    </div>
    <div class="debug-footer">
        <span id="debug-build-info"></span>
    </div>
</div>

<script src="/public/js/constants.js"></script>
<script src="/public/js/messages.js"></script>
<script src="/public/js/home.js"></script>
<script src="/public/js/debug.js"></script>
</body>
</html>
