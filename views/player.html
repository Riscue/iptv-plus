<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Plus</title>
    <link rel="stylesheet" href="/public/css/player.css">
    <link rel="stylesheet" href="/public/css/debug.css">
</head>
<body>
<div id="app">
    <div id="video-container">
        <video id="video" autoplay></video>
        <div id="video-overlay"></div>
    </div>

    <div id="top-bar">
        <button id="btn-back" class="top-btn" tabindex="0">
            <img src="/public/images/icons/arrow-back.svg" class="svg-icon" alt="">
            Back
        </button>
        <div class="channel-info">
            <span id="channel-name">Select Channel</span>
            <span id="channel-number"></span>
        </div>
        <button id="btn-channels" class="top-btn blue-btn" tabindex="0">
            <img src="/public/images/icons/menu.svg" class="svg-icon" alt="">
            Channels
        </button>
    </div>

    <div id="channel-list" class="hidden">
        <div class="list-header">
            <span>Channels</span>
            <button id="btn-close-list" class="close-btn">
                <img src="/public/images/icons/close.svg" class="svg-icon" alt="">
            </button>
        </div>
        <div class="list-tabs">
            <button class="list-tab active" data-tab="favorites">Favoriler</button>
            <button class="list-tab" data-tab="recent">Son Izlenen</button>
            <button class="list-tab" data-tab="all">Tumu</button>
        </div>
        <div class="list-search hidden" id="tab-search-all">
            <input id="search-input" type="text" placeholder="Search..." autocomplete="off">
        </div>
        <div id="tab-favorites" class="tab-content"></div>
        <div id="tab-recent" class="tab-content hidden"></div>
        <div id="tab-all" class="tab-content hidden">
            <div id="category-tabs"></div>
            <div id="channel-items"></div>
        </div>
    </div>

    <div id="bottom-bar">
        <div class="controls-row">
            <button id="btn-ch-prev" class="control-btn">
                <span class="btn-icon"><img src="/public/images/icons/skip-previous.svg" class="svg-icon" alt=""></span>
                <span class="btn-label">Prev</span>
            </button>
            <button id="btn-rwnd" class="control-btn">
                <span class="btn-icon"><img src="/public/images/icons/backward.svg" class="svg-icon" alt=""></span>
                <span class="btn-label">Rewind</span>
            </button>
            <button id="btn-play-pause" class="control-btn main-btn">
                <span class="btn-icon"><img src="/public/images/icons/play.svg" class="svg-icon" alt=""></span>
            </button>
            <button id="btn-fwd" class="control-btn">
                <span class="btn-icon"><img src="/public/images/icons/forward.svg" class="svg-icon" alt=""></span>
                <span class="btn-label">Forward</span>
            </button>
            <button id="btn-ch-next" class="control-btn">
                <span class="btn-icon"><img src="/public/images/icons/skip-next.svg" class="svg-icon" alt=""></span>
                <span class="btn-label">Next</span>
            </button>
        </div>

        <div id="progress-container">
            <div class="progress-middle">
                <div id="progress-bar" class="progress-bar" tabindex="0">
                    <div id="progress-position"></div>
                </div>
            </div>

            <div class="progress-bottom">
                <div id="time-display">
                    <span id="current-time">00:00:00</span>
                    <span id="total-time">--:--:--</span>
                </div>
                <div>
                    <button id="btn-live" class="live-btn hidden red-btn" tabindex="0">
                        <img src="/public/images/icons/live.svg" class="svg-icon" alt="">
                        LIVE
                    </button>
                    <button id="btn-fullscreen" class="fullscreen-btn yellow-btn" tabindex="0">
                        <img src="/public/images/icons/fullscreen.svg" class="svg-icon" alt="">
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="debug-panel" class="debug-panel hidden">
    <div class="debug-header">
        <span>Debug Panel</span>
        <button id="debug-close" class="debug-close">×</button>
    </div>
    <div class="debug-content">
        <div class="debug-section">
            <h3>Keyboard Events (Last 20)</h3>
            <div id="debug-key-events" class="debug-events"></div>
        </div>
        <div class="debug-section">
            <h3>Console Logs (Last 50)</h3>
            <div id="debug-logs" class="debug-logs"></div>
        </div>
    </div>
    <div class="debug-footer">
        <span id="debug-build-info"></span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="/public/js/constants.js"></script>
<script src="/public/js/utils.js"></script>
<script src="/public/js/messages.js"></script>
<script src="/public/js/player.js"></script>
<script src="/public/js/debug.js"></script>
</body>
</html>
